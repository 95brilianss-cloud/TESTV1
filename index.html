<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f8fafc">
    <title>Turbine Logsheet Pro</title>
    
    <script>
        const v = new Date().getTime();
        document.write(`<link rel="stylesheet" href="style.css?t=${v}">`);
    </script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:,">
</head>
<body>

<div id="loader" class="loader-overlay">
    <div style="width: 45px; height: 45px; border: 4px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
    <p style="margin-top: 20px; font-weight: 500;">Sinkronisasi Data...</p>
</div>

<div id="customAlert" class="custom-alert hidden">
    <div class="alert-content">
        <div style="font-size: 40px; margin-bottom: 10px;">✅</div>
        <p id="alertMessage" style="font-weight: 600;">Data berhasil dikirim!</p>
        <button onclick="closeAlert()">Oke</button>
    </div>
</div>

<div class="app-container">
    <div id="homeScreen" class="screen active">
        <div class="home-hero" style="text-align: center; padding: 40px 0;">
            <div style="font-size: 50px; margin-bottom: 10px;">⚙️</div>
            <h1>Turbine System</h1>
            <p style="color: var(--text-muted);">III B - PT Petrokimia Gresik</p>
        </div>
        <div class="area-item" onclick="navigateTo('areaListScreen')">
            <div><b>Mulai Logsheet</b><br><small>Input data operasional</small></div>
            <div>❯</div>
        </div>
        <div class="area-item" onclick="openSettings()">
            <div><b>Pengaturan</b><br><small>Konfigurasi URL</small></div>
            <div>🛠️</div>
        </div>
    </div>

    <div id="areaListScreen" class="screen">
        <div class="header-nav">
            <button class="btn btn-outline" style="width:auto;" onclick="navigateTo('homeScreen')">⬅</button>
            <h2 style="margin:0;">Logsheet</h2>
            <div class="badge" id="statusPill">Offline</div>
        </div>
        <div id="areaList"></div>
        <button class="btn btn-primary" id="submitBtn" style="display:none; margin-top:20px;" onclick="sendToSheet()">🚀 KIRIM DATA</button>
    </div>

    <div id="paramScreen" class="screen">
        <div class="header-nav">
            <span id="stepInfo" style="color: var(--primary); font-weight:bold;"></span>
            <button class="btn btn-outline" style="width:auto; padding:8px 15px;" onclick="navigateTo('areaListScreen')">Batal</button>
        </div>
        
        <div class="input-container">
            <p id="currentAreaName" style="color:var(--text-muted); margin-bottom: 5px; font-size: 14px;"></p>
            <h2 id="labelInput" style="margin-bottom:20px; font-size: 20px;"></h2>
            
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                <input type="text" id="valInput" inputmode="decimal" placeholder="0.0" style="flex: 1; margin: 0;">
                <div id="unitDisplay" style="background:#f1f5f9; padding:15px; border-radius:12px; font-weight:bold; color:var(--text-main); min-width: 60px; text-align: center;">--</div>
            </div>
            
            <div style="font-size:14px; color:var(--text-muted); margin-bottom: 25px;">
                Terakhir: <b style="color:var(--text-main)" id="prevValDisplay">--</b><br>
                Waktu: <b style="color:var(--text-main)" id="lastTimeLabel">--:--</b>
            </div>
            
            <button class="btn btn-primary" onclick="saveStep()">SIMPAN & LANJUT ➔</button>
            <button class="btn btn-outline" style="margin-top: 12px;" onclick="goBack()">← KEMBALI</button>
        </div>
    </div>

    <div id="settingsScreen" class="screen">
        <h2>Configuration</h2>
        <p style="color: var(--text-muted); font-size: 14px;">URL Deployment Google Script:</p>
        <input type="text" id="gasUrlInput" class="main-input" placeholder="https://script.google.com/macros/s/.../exec">
        <button class="btn btn-primary" style="margin-top:20px;" onclick="saveSettings()">Simpan</button>
        <button class="btn btn-outline" style="margin-top:10px;" onclick="navigateTo('homeScreen')">Kembali</button>
    </div>
</div>

<script>
    document.write(`<script src="app.js?t=${new Date().getTime()}"><\/script>`);
</script>

</body>
</html>
